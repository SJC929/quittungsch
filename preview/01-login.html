<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuittungsCH – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap');*{font-family:'DM Sans',sans-serif;}</style>
</head>
<body style="background:#F0FDF9;" class="min-h-screen flex items-center justify-center">

  <!-- Top bar with language switcher -->
  <div style="position:fixed;top:0;left:0;right:0;height:52px;background:white;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-between;padding:0 24px;z-index:50;">
    <div style="display:flex;align-items:center;gap:10px;">
      <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="22" fill="#34D399"/>
        <rect x="18" y="14" width="52" height="64" rx="4" fill="white"/>
        <path d="M18 74 L23 68 L28 74 L33 68 L38 74 L43 68 L48 74 L53 68 L58 74 L63 68 L68 74 L70 74 L70 78 L18 78 Z" fill="white"/>
        <rect x="26" y="23" width="22" height="5" rx="2.5" fill="#059669"/>
        <rect x="26" y="33" width="32" height="3" rx="1.5" fill="#D1FAE5"/>
        <rect x="26" y="40" width="28" height="3" rx="1.5" fill="#D1FAE5"/>
        <rect x="26" y="47" width="30" height="3" rx="1.5" fill="#D1FAE5"/>
        <rect x="26" y="54" width="24" height="3" rx="1.5" fill="#D1FAE5"/>
        <rect x="26" y="61" width="20" height="4" rx="2" fill="#059669"/>
        <circle cx="72" cy="74" r="18" fill="#047857"/>
        <circle cx="72" cy="74" r="13" fill="white"/>
        <circle cx="72" cy="74" r="8" fill="none" stroke="#047857" stroke-width="3"/>
        <line x1="78" y1="80" x2="86" y2="88" stroke="#047857" stroke-width="4" stroke-linecap="round"/>
        <rect x="67" y="72" width="10" height="2" rx="1" fill="#047857"/>
        <rect x="67" y="76" width="7" height="2" rx="1" fill="#047857"/>
      </svg>
      <span style="font-size:17px;font-weight:700;color:#059669;">QuittungsCH</span>
    </div>
    <select id="langSelect" onchange="changeLang(this.value)" style="padding:6px 10px;border:1px solid #E5E7EB;border-radius:10px;font-family:inherit;font-size:13px;color:#374151;background:white;cursor:pointer;">
      <option value="de">🇩🇪 Deutsch</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="it">🇮🇹 Italiano</option>
      <option value="rm">🏔️ Rumantsch</option>
      <option value="en">🇬🇧 English</option>
      <option value="tr">🇹🇷 Türkçe</option>
      <option value="sq">🇦🇱 Shqip</option>
    </select>
  </div>

  <div class="w-full max-w-md px-4" style="margin-top:52px;">

    <!-- Back link -->
    <a href="index.html" class="text-sm text-blue-500 hover:underline mb-6 block">← Zurück zur Übersicht</a>

    <!-- Logo -->
    <div class="text-center mb-8">
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;">
        <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" rx="22" fill="#34D399"/>
          <rect x="18" y="14" width="52" height="64" rx="4" fill="white"/>
          <path d="M18 74 L23 68 L28 74 L33 68 L38 74 L43 68 L48 74 L53 68 L58 74 L63 68 L68 74 L70 74 L70 78 L18 78 Z" fill="white"/>
          <rect x="26" y="23" width="22" height="5" rx="2.5" fill="#059669"/>
          <rect x="26" y="33" width="32" height="3" rx="1.5" fill="#D1FAE5"/>
          <rect x="26" y="40" width="28" height="3" rx="1.5" fill="#D1FAE5"/>
          <rect x="26" y="47" width="30" height="3" rx="1.5" fill="#D1FAE5"/>
          <rect x="26" y="54" width="24" height="3" rx="1.5" fill="#D1FAE5"/>
          <rect x="26" y="61" width="20" height="4" rx="2" fill="#059669"/>
          <circle cx="72" cy="74" r="18" fill="#047857"/>
          <circle cx="72" cy="74" r="13" fill="white"/>
          <circle cx="72" cy="74" r="8" fill="none" stroke="#047857" stroke-width="3"/>
          <line x1="78" y1="80" x2="86" y2="88" stroke="#047857" stroke-width="4" stroke-linecap="round"/>
          <rect x="67" y="72" width="10" height="2" rx="1" fill="#047857"/>
          <rect x="67" y="76" width="7" height="2" rx="1" fill="#047857"/>
        </svg>
        <span style="font-size:28px;font-weight:800;color:#059669;">QuittungsCH</span>
      </div>
      <p class="text-gray-400 mt-1 text-sm">Belege einfach erfassen – für Schweizer Selbständige</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <h2 class="text-xl font-bold text-gray-900 mb-6">Anmelden</h2>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">E-Mail</label>
          <input type="email" placeholder="max@muster.ch" value="max@muster.ch"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-800 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Passwort</label>
          <input type="password" value="••••••••"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-800 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <a href="03-dashboard.html">
          <button class="w-full bg-emerald-700 hover:bg-emerald-800 text-white font-semibold rounded-xl py-3 text-sm transition mt-2">
            Anmelden
          </button>
        </a>
      </div>

      <!-- Divider -->
      <div class="relative my-5">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
        <div class="relative flex justify-center text-xs"><span class="px-3 bg-white text-gray-400">oder</span></div>
      </div>

      <button class="w-full border border-gray-300 text-gray-700 font-medium rounded-xl py-3 text-sm hover:bg-gray-50 transition">
        ✉️ Mit Magic Link anmelden
      </button>

      <p class="text-center text-sm text-gray-400 mt-6">
        Noch kein Konto?
        <a href="#" class="text-emerald-700 font-medium hover:underline ml-1">Registrieren</a>
      </p>
    </div>

    <!-- Register preview below -->
    <div class="bg-white rounded-2xl shadow-lg p-8 mt-6">
      <h2 class="text-xl font-bold text-gray-900 mb-1">Konto erstellen</h2>
      <p class="text-xs text-gray-400 mb-5">14 Tage kostenlos – kein Zahlungsmittel nötig</p>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Name / Firma</label>
          <input type="text" placeholder="Max Muster GmbH"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">E-Mail *</label>
          <input type="email" placeholder="max@muster.ch"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Passwort *</label>
          <input type="password" placeholder="Min. 8 Zeichen"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm bg-gray-50">
        </div>
        <button class="w-full bg-emerald-700 text-white font-semibold rounded-xl py-3 text-sm">
          Kostenlos registrieren
        </button>
        <p class="text-xs text-gray-400 text-center">Alle Daten werden in der Schweiz gespeichert 🇨🇭 (DSG-konform)</p>
      </div>
    </div>

  </div>

  <script>
  function changeLang(lang) { console.log('Language changed to:', lang); }
  </script>
</body>
</html>
